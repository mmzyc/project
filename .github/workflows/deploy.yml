name: Deploy dev → main

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: 复制并修改路径
        run: |
          mkdir -p build
          
          # 复制时排除 build 目录，防止循环复制
          rsync -av --exclude='build' --exclude='.git' . build/
          
          cd build
          find . -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) | while read -r file; do
            # 处理引号开头的路径: "/css/ → "/project/css/
            sed -i -E 's|(["\'\''])/(css|js|img|assets|static|fonts|media|modules)/|\1/project/\2/|g' "$file"

            # 处理 CSS 的 url(): url(/img/ → url(/project/img/
            sed -i -E 's|url\((["\'\'']?)/(img|assets|static|fonts|media)/|url(\1/project/\2/|g' "$file"
          done
          echo "构建完成"

      - name: 部署到 main 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: main
          force_orphan: true