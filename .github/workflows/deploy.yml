name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 修改资源路径
        run: |
          find . -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) -print0 | \
          xargs -0 sed -i -E 's|(["'\''])/?(css|js|img|assets|static|fonts|media|uploads|files|data|json|lib|vendor|plugins)(/[^"'\'' ]*)|\1/project/\2\3|g'

      - name: Commit 修改
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update asset paths for pages deployment"
          file_pattern: "*.html *.css *.js"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4