name: Deploy dev → main

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: 复制并修改路径
        run: |
          mkdir -p build
          rsync -av --exclude='build' --exclude='.git' . build/

          cd build

          # 用 sed -E 一次性处理所有情况
          find . -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) -exec sed -i -E \
            -e 's|(["'\''])(\.\./)?(css|js|img|assets|static|fonts|media|uploads|files|data|json|lib|vendor|plugins|js/modules)/|\1/project/\3/|g' \
            -e 's|(["'\''])(\./)?(css|js|img|assets|static|fonts|media|uploads|files|data|json|lib|vendor|plugins|js/modules)/|\1/project/\3/|g' \
            {} +

          echo "路径替换完成"

      - name: 部署到 main 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: main
          force_orphan: true