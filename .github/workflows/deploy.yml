name: Deploy dev → main

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: 复制并修改路径
        run: |
          mkdir -p build
          
          # 复制时排除 build 目录，防止循环复制
          rsync -av --exclude='build' --exclude='.git' . build/
          
          cd build
          find . -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) | while read -r file; do
            # ---- 原有的引号路径处理 ----
            sed -i 's|\(["'\'']\)/\(css/\)|\1/project/\2|g' "$file"
            sed -i 's|\(["'\'']\)/\(js/\)|\1/project/\2|g' "$file"
            sed -i 's|\(["'\'']\)/\(img/\)|\1/project/\2|g' "$file"
            sed -i 's|\(["'\'']\)/\(assets/\)|\1/project/\2|g' "$file"
            sed -i 's|\(["'\'']\)/\(static/\)|\1/project/\2|g' "$file"
            sed -i 's|\(["'\'']\)/\(fonts/\)|\1/project/\2|g' "$file"
            sed -i 's|\(["'\'']\)/\(media/\)|\1/project/\2|g' "$file"
            sed -i 's|\(["'\'']\)/\(modules/\)|\1/project/\2|g' "$file"

            # ---- 新增：处理 CSS 的 url() ----
            # url(/img/xxx) → url(/project/img/xxx)
            sed -i 's|url(\(/\)\(img/\)|url(/project/\2|g' "$file"
            sed -i 's|url(\(/\)\(assets/\)|url(/project/\2|g' "$file"
            sed -i 's|url(\(/\)\(static/\)|url(/project/\2|g' "$file"
            sed -i 's|url(\(/\)\(fonts/\)|url(/project/\2|g' "$file"
            sed -i 's|url(\(/\)\(media/\)|url(/project/\2|g' "$file"

            # url("../img/xxx") → url("/project/img/xxx")
            sed -i 's|url("\(/\)\(img/\)|url("/project/\2|g' "$file"
            sed -i 's|url("\(/\)\(assets/\)|url("/project/\2|g' "$file"
            sed -i 's|url("\(/\)\(static/\)|url("/project/\2|g' "$file"
            sed -i 's|url("\(/\)\(fonts/\)|url("/project/\2|g' "$file"
            sed -i 's|url("\(/\)\(media/\)|url("/project/\2|g' "$file"

            # url('../img/xxx') → url('/project/img/xxx')
            sed -i "s|url('\(/\)\(img/\)|url('/project/\2|g" "$file"
            sed -i "s|url('\(/\)\(assets/\)|url('/project/\2|g" "$file"
            sed -i "s|url('\(/\)\(static/\)|url('/project/\2|g" "$file"
            sed -i "s|url('\(/\)\(fonts/\)|url('/project/\2|g" "$file"
            sed -i "s|url('\(/\)\(media/\)|url('/project/\2|g" "$file"
          done
          echo "构建完成"

      - name: 部署到 main 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: main
          force_orphan: true