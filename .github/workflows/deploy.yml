name: Deploy dev → main

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: 复制并修改路径
        run: |
          mkdir -p build
          rsync -av --exclude='build' --exclude='.git' . build/

          cd build

          # 修改路径：把引号内的路径改成 /project/xxx
          # 处理 html/css/js 文件
          find . -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) -exec sed -i \
            -e 's|\(["'\'']\)\(css/\)|\1/project/\2|g' \
            -e 's|\(["'\'']\)\(js/\)|\1/project/\2|g' \
            -e 's|\(["'\'']\)\(img/\)|\1/project/\2|g' \
            -e 's|\(["'\'']\)\(assets/\)|\1/project/\2|g' \
            -e 's|\(["'\'']\)\(static/\)|\1/project/\2|g' \
            -e 's|\(["'\'']\)\(fonts/\)|\1/project/\2|g' \
            -e 's|\(["'\'']\)\(media/\)|\1/project/\2|g' \
            -e 's|\(["'\'']\)\(uploads/\)|\1/project/\2|g' \
            {} +

          echo "路径替换完成"

      - name: 部署到 main 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: main
          force_orphan: true