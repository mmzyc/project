name: Deploy dev → main

on:
  push:
    branches: [dev]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout dev
        uses: actions/checkout@v4
        with:
          ref: dev

      - name: 复制并修改路径
        run: |
          mkdir -p build
          
          # 复制时排除 build 目录，防止循环复制
          rsync -av --exclude='build' --exclude='.git' . build/
          
          cd build
          find . -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) | while read -r file; do
            sed -i 's|["'\'']/\(css/\)|"/project/\1|g' "$file"
            sed -i 's|["'\'']/\(js/\)|"/project/\1|g' "$file"
            sed -i 's|["'\'']/\(img/\)|"/project/\1|g' "$file"
            sed -i 's|["'\'']/\(assets/\)|"/project/\1|g' "$file"
            sed -i 's|["'\'']/\(static/\)|"/project/\1|g' "$file"
            sed -i 's|["'\'']/\(fonts/\)|"/project/\1|g' "$file"
            sed -i 's|["'\'']/\(media/\)|"/project/\1|g' "$file"
            sed -i 's|["'\'']/\(modules/\)|"/project/\1|g' "$file"
          done
          echo "构建完成"

      - name: 部署到 main 分支
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./build
          publish_branch: main
          force_orphan: true