name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: 修改资源路径（适配你的项目）
        run: |
          find . -type f \( -name "*.html" -o -name "*.css" -o -name "*.js" \) | while read -r file; do
            # 处理 js/ 和 /js/
            sed -i 's|["'\'']\(/\{0,1\}js/\)|"/project/js/|g' "$file"
            # 处理 css/ 和 /css/
            sed -i 's|["'\'']\(/\{0,1\}css/\)|"/project/css/|g' "$file"
            # 处理其他常见目录
            sed -i 's|["'\'']\(/\{0,1\}img/\)|"/project/img/|g' "$file"
            sed -i 's|["'\'']\(/\{0,1\}assets/\)|"/project/assets/|g' "$file"
            sed -i 's|["'\'']\(/\{0,1\}static/\)|"/project/static/|g' "$file"
            sed -i 's|["'\'']\(/\{0,1\}modules/\)|"/project/modules/|g' "$file"
          done
          echo "路径修改完成"

      - name: Commit 修改
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update asset paths for github pages"
          file_pattern: "*.html *.css *.js"

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4