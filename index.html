<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>我的小站</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                "Helvetica Neue", Arial, sans-serif;
            background: #f0f2f5;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            max-width: 1100px;
            width: 100%;
        }

        .header {
            margin-bottom: 36px;
        }

        .header h1 {
            font-size: 30px;
            font-weight: 700;
            color: #1a1a2e;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #888;
            font-size: 16px;
            margin-top: 6px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 24px;
        }

        .card {
            background: #ffffff;
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
            text-decoration: none;
            color: #1a1a2e;
            transition: transform 0.25s ease, box-shadow 0.25s ease;
            border: 1px solid rgba(0, 0, 0, 0.04);
            display: flex;
            flex-direction: column;
        }

        .card:hover {
            transform: translateY(-6px);
            box-shadow: 0 12px 36px rgba(0, 0, 0, 0.10);
        }

        .card .thumb {
            width: 100%;
            aspect-ratio: 16 / 10;
            object-fit: cover;
            display: block;
            background: #e8ecf0;
        }

        .card .info {
            padding: 16px 18px 18px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .card .title {
            font-size: 17px;
            font-weight: 600;
            margin-bottom: 4px;
        }

        .card .desc {
            font-size: 14px;
            color: #999;
            line-height: 1.4;
            flex: 1;
        }

        .card .tag {
            margin-top: 10px;
            font-size: 12px;
            color: #bbb;
            letter-spacing: 0.3px;
            border-top: 1px solid #f0f0f0;
            padding-top: 10px;
            text-align: right;
        }

        /* 空状态 */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 80px 20px;
            color: #bbb;
        }
        .empty-state .big-icon {
            font-size: 56px;
            display: block;
            margin-bottom: 16px;
        }

        /* 响应式 */
        @media (max-width: 480px) {
            .grid {
                grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
                gap: 16px;
            }
            .card .info {
                padding: 12px 14px 14px;
            }
            .card .title {
                font-size: 15px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧰 我的工具箱</h1>
            <p>一些独立的小页面 · 点卡片进去看看</p>
        </div>

        <div class="grid" id="cardGrid">
            <!-- 由 JavaScript 动态生成 -->
        </div>
    </div>

    <script>
        // ════════════════════════════════════════════
        //  ★★★ 在这里添加你的页面 ★★★
        // ════════════════════════════════════════════
        const pages = [
            {
                title: "待办清单",
                desc: "一个轻量级的 TODO 小工具",
                img: "img/todo.jpg",      // 图片路径，可换成 .png .webp
                url: "todo.html",
                tag: "工具"
            },
            {
                title: "天气查询",
                desc: "查看实时天气信息",
                img: "img/weather.jpg",
                url: "weather.html",
                tag: "工具"
            },
            {
                title: "番茄时钟",
                desc: "专注计时器，番茄工作法",
                img: "img/clock.jpg",
                url: "clock.html",
                tag: "效率"
            },
            {
                title: "计算器",
                desc: "简洁的计算器",
                img: "img/calc.jpg",
                url: "calculator.html",
                tag: "工具"
            },
            // ═══ 继续往下加 ═══
            // {
            //     title: "新项目",
            //     desc: "描述文字",
            //     img: "img/xxx.jpg",
            //     url: "xxx.html",
            //     tag: "分类"
            // },
        ];
        // ════════════════════════════════════════════

        const grid = document.getElementById("cardGrid");

        if (!pages || pages.length === 0) {
            grid.innerHTML = `
                <div class="empty-state">
                    <span class="big-icon">📂</span>
                    <p>还没有添加页面<br>在 <code>pages</code> 数组里加几条数据吧</p>
                </div>
            `;
        } else {
            grid.innerHTML = pages
                .map(
                    (p) => `
                    <a href="${p.url}" class="card">
                        <img class="thumb" src="${p.img}" alt="${p.title}" loading="lazy" />
                        <div class="info">
                            <div class="title">${p.title}</div>
                            <div class="desc">${p.desc || ""}</div>
                            ${p.tag ? `<div class="tag"># ${p.tag}</div>` : ""}
                        </div>
                    </a>
                `
                )
                .join("");
        }
    </script>
</body>
</html>
